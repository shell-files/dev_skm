name: "🐛 Bug Report"
description: "버그를 보고하고 문제를 해결하기 위한 상세 양식입니다."
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        ### 🚨 버그 제보 가이드
        원활한 문제 해결을 위해 아래 항목들을 꼼꼼히 작성해 주세요.

  - type: textarea
    id: bug-description
    attributes:
      label: "❓ 버그 설명"
      description: "어떤 상황에서 어떤 문제가 발생했는지 구체적으로 작성해주세요."
      placeholder: "예: 로그인 버튼을 눌렀을 때 404 에러가 발생하며 메인 페이지로 이동하지 않습니다."
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: "📍 발생 영역"
      description: "어느 파트에서 발생한 문제인가요?"
      options:
        - FE (Frontend)
        - BE (Backend)
        - DB (Database)
        - AI (Model/Logic)
        - Infra / Deploy
    validations:
      required: true

  - type: dropdown
    id: frequency
    attributes:
      label: "🔄 발생 빈도"
      options:
        - 항상 발생 (Always)
        - 가끔 발생 (Intermittent)
        - 1회성 (Once)
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: "🔥 우선순위"
      options:
        - High (서비스 이용 불가)
        - Medium (기능상 오류)
        - Low (UI/UX 개선 및 오타)
    validations:
      required: true

  - type: textarea
    id: expected-actual
    attributes:
      label: "📊 기대 결과 vs 실제 결과"
      description: "정상 동작 시의 기대값과 현재 발생하는 실제 결과를 비교해 주세요."
      value: |
        **기대 결과 (Expected):** **실제 결과 (Actual):** validations:
      required: true

  - type: textarea
    id: error-logs
    attributes:
      label: "📑 에러 로그"
      description: "콘솔 로그, 서버 로그, 네트워크 응답 등을 아래 코드 블럭에 넣어주세요."
      render: bash
      placeholder: "에러 로그를 복사하여 붙여넣으세요."

  - type: textarea
    id: screenshots
    attributes:
      label: "📸 스크린샷 (선택)"
      description: "이미지나 GIF를 첨부해 주세요."

  - type: textarea
    id: references
    attributes:
      label: "🔗 참고 문서 및 링크"
      description: "관련 노션 페이지나 API 명세서 등이 있다면 링크를 남겨주세요."