name: "🚨 Incident Report (장애 대응 및 회고)"
description: "서비스 장애 발생 시 상황을 기록하고 재발 방지 대책을 수립합니다."
title: "[INCIDENT] "
labels: ["incident", "critical"]
body:
  - type: markdown
    attributes:
      value: |
        ## ⚠️ 장애 상황 보고
        장애 상황을 정확히 기록하여 빠른 복구와 철저한 원인 분석을 진행합니다.

  - type: input
    id: occurrence_time
    attributes:
      label: "⏰ 발생 및 인지 시간"
      placeholder: "예: 2026-04-21 13:00 (KST) / 인지: 13:10"
    validations:
      required: true

  - type: textarea
    id: incident_summary
    attributes:
      label: "🔍 장애 내용"
      placeholder: "발생한 현상을 구체적으로 기술해 주세요. (예: 결제 API 호출 시 500 에러 발생)"
    validations:
      required: true

  - type: dropdown
    id: impact_scope
    attributes:
      label: "📡 영향 범위"
      options:
        - "전체 서비스 중단"
        - "일부 기능 이용 불가 (핵심)"
        - "일부 기능 이용 불가 (비핵심)"
        - "간헐적 지연 발생"
    validations:
      required: true

  - type: textarea
    id: root_cause
    attributes:
      label: "🕵️ 원인 분석"
      placeholder: "장애가 발생한 근본 원인(Root Cause)을 기술합니다."
    validations:
      required: true

  - type: textarea
    id: resolution
    attributes:
      label: "🛠️ 조치 사항 (Action Taken)"
      placeholder: "문제를 해결하기 위해 어떤 작업을 수행했는지 시간순으로 작성합니다."
    validations:
      required: true

  - type: textarea
    id: prevention
    attributes:
      label: "🛡️ 재발 방지 대책 (Postmortem)"
      placeholder: "향후 동일한 문제가 발생하지 않도록 하기 위한 시스템적/프로세스적 개선안을 작성합니다."
    validations:
      required: true

  - type: input
    id: monitoring_links
    attributes:
      label: "📊 관련 로그 및 모니터링 링크"
      placeholder: "Grafana, Sentry, CloudWatch 등의 링크를 첨부해 주세요."